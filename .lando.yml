# ============================================
# TAVP Core - Lando Stack Configuration
# ============================================
#
# Usage:
#   lando start              - Start all services
#   lando ssh                - Enter the appserver container
#   bash scripts/install-phalcon.sh   - Install Phalcon 5.16 (inside container)
#   lando tavp               - Run the tavp CLI
#
# App:         http://tavp-core.lndo.site
# Mailpit:     http://mail.tavp-core.lndo.site   (OTP inbox)
# phpMyAdmin:  http://pma.tavp-core.lndo.site

name: tavp-core
recipe: lamp
config:
  php: '8.3'
  webroot: public
  database: mariadb:10.11

services:
  appserver:
    type: php:8.3
    webroot: public
    overrides:
      environment:
        TZ: Asia/Jakarta
        PHP_OPCACHE_ENABLE: "1"
        MAIL_HOST: tavp-core-mailpit
        MAIL_PORT: "1025"

  database:
    type: mariadb:10.11
    portforward: 33307
    creds:
      user: tavp
      password: tavp
      database: tavp

  cache:
    type: redis
    portforward: 36380

  # Unique Mailpit so OTP emails land only in this project's inbox.
  tavp-core-mailpit:
    type: mailpit
    overrides:
      ports:
        - "0.0.0.0:8226:8025"    # Web UI (host:8226 -> container:8025)
        - "0.0.0.0:1226:1025"    # SMTP   (host:1226 -> container:1025)

  phpmyadmin:
    type: phpmyadmin
    hosts:
      - database

proxy:
  appserver:
    - tavp-core.lndo.site
  tavp-core-mailpit:
    - mail.tavp-core.lndo.site
  phpmyadmin:
    - pma.tavp-core.lndo.site

tooling:
  tavp:
    service: appserver
    cmd: php bin/tavp
  composer:
    service: appserver
    cmd: composer
  php:
    service: appserver
    cmd: php
  artisan:
    service: appserver
    cmd: php bin/tavp
